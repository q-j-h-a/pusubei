    .topbar {

      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      color: var(--text);
    }
    .shell {
      min-height: 0;
      height: calc(100vh - var(--topbar-height));
      display: grid;
      grid-template-columns: var(--sidebar-width) 8px minmax(0, var(--main-width)) 8px var(--assistant-width);
      overflow: hidden;
    }
    .shell.theory {
      grid-template-columns: var(--sidebar-width) 8px minmax(0, 1fr);
    }
    .shell.theory.theory-with-panel {
      grid-template-columns: var(--sidebar-width) 8px minmax(0, var(--main-width)) 8px var(--assistant-width);
    }
    .shell.theory .assistant,
    .shell.theory .splitter-right {
      display: none;
    }
    .shell.theory.theory-with-panel .assistant,
    .shell.theory.theory-with-panel .splitter-right {
      display: block;
    }
    .sidebar {
      background: #fff;
      padding: 20px 14px;
      min-height: 0;
      height: 100%;
      overflow: auto;
    }
    .splitter {
      position: relative;
      z-index: 5;
      min-width: 8px;
      height: 100%;
      background: #fff;
      cursor: col-resize;
      touch-action: none;
    }
    .splitter::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 3px;
      width: 1px;
      background: var(--line);
      transition: background .16s ease, box-shadow .16s ease;
    }
    .splitter:hover::before,
    .splitter.dragging::before {
      background: rgba(91, 53, 245, .72);
      box-shadow: 0 0 0 2px rgba(91, 53, 245, .12);
    }
    body.resizing-shell {
      cursor: col-resize;
      user-select: none;
    }
    .main {
      min-width: 0;

      height: 100%;
      background: linear-gradient(180deg, #fbfcff 0%, #f7f8fb 100%);

    }
    .assistant {
      background: #fff;
      padding: 28px 24px;
      min-height: 0;
      min-width: 0;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;

    .assistant *,

    #rightPanel {
      max-width: 100%;
      overflow-x: hidden;

    .nav-section {
      border-bottom: 1px solid var(--line);
      padding: 0 0 18px;
      margin-bottom: 18px;
    }
    .nav-section:last-of-type {
      margin-bottom: 0;

    .nav-section-title {
      display: flex;
      align-items: center;
      font-size: 15px;
      font-weight: 900;
      color: #111827;
      min-height: 34px;
      margin-bottom: 10px;
      padding: 0 4px;
    }
    .chev {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      display: grid;
      place-items: center;
      transition: transform .18s ease;
    }
    details[open] > summary .chev { transform: rotate(90deg); }
    .step-list {
      position: relative;
      display: grid;
      gap: 6px;
      padding-left: 10px;
    }
    .step-list:before {
      content: "";
      position: absolute;
      left: 28px;
      top: 12px;
      bottom: 12px;
      width: 1px;
      background: #dbe3ef;
    }
    .nav-btn {
      position: relative;
      width: 100%;
      border: 0;
      background: transparent;
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 11px;
      align-items: center;
      text-align: left;
      min-height: 40px;
      padding: 9px 10px;
      color: var(--text);
      border-radius: 10px;
      transition: background .16s ease, color .16s ease, box-shadow .16s ease;
    }
    .nav-btn:focus,
    .nav-btn:focus-visible,
    details.nested-section summary:focus,
    details.nested-section summary:focus-visible {
      outline: none;
    }
    .nav-btn:hover {
      background: var(--purple-soft);
    }
    .dot {
      position: relative;
      z-index: 1;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid #cfd5df;
      background: #fff;
      margin-top: 0;
      transition: all .18s ease;
    }
    .nav-btn strong {
      display: block;
      font-size: 14px;
      line-height: 1.35;
    }
    .nav-btn > span:not(.dot) {
      display: block !important;
      min-width: 0;
    }
    .nav-btn > span:not(.dot) strong {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    .nav-btn > span:not(.dot) > span:not(.chev) {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 3px;
    }
    .nav-btn:hover strong { color: var(--purple); }
    .nav-btn:hover .dot {
      border-color: var(--purple);
    }
    .nav-btn.active .dot {
      border-color: var(--purple);
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    .nav-btn.active {
      background: var(--purple-soft);
    }
    .nav-btn.active strong { color: var(--purple); }
    .nav-subhead {
      margin: 8px 0 4px 32px;
      color: #111827;
      font-weight: 900;
      font-size: 13px;

    details.nested-section {
      position: relative;
      padding: 0;
      margin: 0;
    }
    details.nested-section summary {
      list-style: none;
      display: grid;
      grid-template-columns: 18px 1fr 22px;
      align-items: center;
      gap: 11px;
      color: var(--text);
      cursor: pointer;
      min-height: 40px;
      border-radius: 10px;
      padding: 9px 10px;
      transition: background .16s ease, color .16s ease;
    }
    details.nested-section summary::-webkit-details-marker { display: none; }
    details.nested-section summary:hover {
      background: var(--purple-soft);

    }
    details.nested-section summary strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }
    details.nested-section summary span.sub {

      color: var(--muted);

      line-height: 1.45;
      margin-top: 3px;

    details.nested-section summary:hover .dot {

    }
    details.nested-section.active summary strong {
      color: var(--purple);
    }
    details.nested-section.active summary > .dot {
      border-color: var(--purple);
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);

    details.nested-section .step-list {

      margin-top: 6px;
      gap: 6px;
    }
    details.nested-section:not([open]) .step-list {
      display: none;
      margin-top: 0;
    }
    details.nested-section .step-list:before {
      left: 36px;
      top: 8px;
      bottom: 8px;
    }
    details.nested-section .nav-btn {
      min-height: 38px;
      padding: 8px 10px;
    }
    details.nested-section .nav-btn strong {

    }
    details.nested-section .chev {

    .theory-deck-shell {
      overflow: hidden;
      border: 1px solid rgba(211, 221, 236, .9);
      border-radius: 28px;
      width: min(100%, 1360px);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      background:
        radial-gradient(circle at 86% 12%, rgba(59, 130, 246, .08), transparent 24%),
        radial-gradient(circle at 10% 18%, rgba(255, 255, 255, .88), transparent 22%),
        linear-gradient(180deg, rgba(255, 255, 255, .96), rgba(245, 248, 252, .92));
      box-shadow: 0 28px 70px rgba(15, 23, 42, .10);
    }
    .theory-deck-shell.mode-shift-editing .theory-slide.active {
      animation: theory-mode-slide-in .34s ease both;
    }
    .theory-deck-shell.mode-shift-readonly .theory-slide.active {
      animation: theory-mode-settle .34s ease both;
    }
    .theory-deck-shell.mode-shift-editing .theory-deck-toolbar,
    .theory-deck-shell.mode-shift-readonly .theory-deck-toolbar {
      animation: theory-toolbar-flash .34s ease both;
    }
    @keyframes theory-mode-slide-in {
      0% { transform: translateX(18px) scale(var(--slide-scale, 1)); filter: saturate(.92); }
      100% { transform: translateX(0) scale(var(--slide-scale, 1)); filter: saturate(1); }
    }
    @keyframes theory-mode-settle {
      0% { transform: translateX(-14px) scale(var(--slide-scale, 1)); filter: saturate(1.08); }
      100% { transform: translateX(0) scale(var(--slide-scale, 1)); filter: saturate(1); }
    }
    @keyframes theory-toolbar-flash {
      0% { background: rgba(219, 234, 254, .72); }
      100% { background: rgba(255, 255, 255, .38); }
    }

    .preprocess-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 14px 0;
    }
    .preprocess-metrics.metrics-three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .preprocess-metric {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcff;
      padding: 13px;
      min-width: 0;
    }
    .preprocess-metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 7px;
    }
    .preprocess-metric strong {
      display: block;
      color: #111827;
      font-size: 18px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .teaching-note {
      border-left: 4px solid #d9e3f2;
      padding: 8px 0 8px 16px;
      color: #111827;
      font-size: 16px;
      line-height: 1.8;
      margin: 16px 0;
    }
    .preprocess-info-card {
      height: auto;
      min-height: 420px;
    }
    .preprocess-step-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      height: 100%;
    }
    .preprocess-step-body .preprocess-metrics {
      flex: 0 0 auto;
      margin: 0;
    }
    .preprocess-step-body .table-wrap {
      flex: 1 1 auto;
      min-height: 0;
      max-height: none;
    }
    .standardize-overview-card {
      overflow: hidden;
    }
    .standardize-overview-body {
      padding: 0;
      gap: 0;
    }
    .standardize-overview-body .content-card {
      border-left: 0;
      border-right: 0;
      border-radius: 0;
      box-shadow: none;
      margin: 0;
    }
    .standardize-overview-body .content-card:first-child {
      border-top: 0;
    }
    .standardize-overview-body .content-card:last-child {
      border-bottom: 0;
    }
    .standardize-overview-body .preprocess-info-card {
      border-left: 0;
      border-right: 0;
      border-radius: 0;
      box-shadow: none;
      min-height: 0;
      height: auto;
    }
    .standardize-overview-body .preprocess-info-card:first-child {
      border-top: 0;
    }
    .standardize-overview-body .preprocess-info-card:last-child {
      border-bottom: 0;
    }
    .load-dataset-card {
      min-height: 116px;
      height: 100%;
      border: 1px dashed #bfdbfe;
      background: #eff6ff;
      box-shadow: none;
      display: grid;
      place-items: center;
      grid-template-rows: 1fr;
    }
    .load-dataset-card .chart-head {
      position: absolute;
      inset: 0;
      z-index: 1;
      padding: 0;
      cursor: grab;
    }
    .load-dataset-card .chart-head:active {
      cursor: grabbing;
    }
    .load-dataset-hint {
      position: relative;
      z-index: 2;
      padding: 26px;
      color: #1e3a8a;
      font-size: 18px;
      font-weight: 950;
      text-align: center;
      pointer-events: none;
    }
    .section-status {
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: #fff;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }
    .section-status.ready {
      border-color: #bbf7d0;
      color: #047857;
      background: #ecfdf5;
    }
    .section-status.warn {
      border-color: #fde68a;
      color: #92400e;
      background: #fffbeb;
    }
    .hidden { display: none !important; }
    @media (max-width: 1260px) {
      .app {
        --sidebar-width: 240px;
        --assistant-width: 300px;
      }
      .shell {
        grid-template-columns: var(--sidebar-width) 8px minmax(420px, 1fr) 8px var(--assistant-width);
      }
      .topbar {
        grid-template-columns: var(--sidebar-width) 8px minmax(420px, 1fr) 8px var(--assistant-width);
      }
      .shell.theory {
        grid-template-columns: var(--sidebar-width) 8px minmax(0, 1fr);
      }
    }
    @media (max-width: 860px) {
      .app { grid-template-rows: auto minmax(0, 1fr); }
      .topbar {
        display: flex;
        align-items: stretch;
        flex-direction: column;
        gap: 12px;
        padding: 12px 18px;
      }
      .brand,
      .top-actions,
      .page-top-slot {
        padding: 0;
      }
      .page-top-slot {
        height: auto;
      }
      .shell, .shell.theory, .chart-grid, .chart-grid.single, .stat-cards, .format-grid, .stage-strip, .preprocess-flow, .preprocess-metrics { grid-template-columns: 1fr; }
      .preprocess-flow {
        flex-direction: column;
        gap: 8px;
      }
      .flow-step {
        flex-basis: auto;
        width: 100%;
      }
      .flow-step::after {
        display: none;
      }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .splitter { display: none; }
      .chart-card.wide { grid-column: auto; }
    }

    /* ==========================================================================
       详情页双栏编辑模式样式
       ========================================================================== */
    .theory-detail-split-container {
      display: grid;
      grid-template-columns: 0fr 1fr;
      gap: 0;
      height: calc(100vh - 140px);
      transition: grid-template-columns 0.35s cubic-bezier(0.4, 0, 0.2, 1), gap 0.35s ease;
      overflow: hidden;
      margin-top: 10px;
    }
    .theory-detail-split-container.editing {
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .theory-detail-editor-pane {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0; /* Prevents expanding beyond the grid height */
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
      background: #1e1e2e; /* Catppuccin Mocha Dark style */
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 12px 36px rgba(15, 23, 42, 0.25);
    }
    .theory-detail-split-container.editing .theory-detail-editor-pane {
      opacity: 1;
      visibility: visible;
    }
    .theory-detail-preview-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden; /* Iframe scrolls natively, hide parent scrollbar */
      min-height: 0; /* Prevents expanding beyond the grid height */
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #ffffff;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }
    .theory-detail-editor-toolbar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 12px;
    }
    .theory-detail-editor-toolbar button {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #cdd6f4;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .theory-detail-editor-toolbar button:hover {
      background: var(--purple);
      border-color: var(--purple);
      color: #ffffff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
    }
    .theory-detail-editor-toolbar button:active {
      transform: translateY(1px);
    }
    .theory-detail-textarea {
      flex: 1;
      width: 100%;
      background: transparent;
      border: 0;
      outline: none;
      color: #cdd6f4;
      font-family: "Fira Code", Consolas, Monaco, monospace;
      font-size: 13.5px;
      line-height: 1.6;
      resize: none;
      padding: 8px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
    }
    .theory-detail-textarea::-webkit-scrollbar {
      width: 6px;
    }
    .theory-detail-textarea::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 99px;
    }
  </style>
</head>

          <button class="nav-btn" data-page="experiment_test" type="button"><span class="dot"></span><span><strong>实验测试</strong><span>按流程完成测试并生成结果</span></span></button>
        </div>
      </section>
    </aside>

    <div class="splitter splitter-left" data-resize-edge="left" role="separator" aria-orientation="vertical" aria-label="调整左侧导航宽度"></div>

    <main class="main" id="main"></main>

    <div class="splitter splitter-right" data-resize-edge="right" role="separator" aria-orientation="vertical" aria-label="调整右侧控制面板宽度"></div>

    <aside class="assistant">

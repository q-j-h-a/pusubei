<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简单线性回归教学实验</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2/dist/echarts-gl.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css">
  <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/chart_renderers.js"></script>
  <script src="/static/js/control_renderers.js"></script>
  <script src="/static/js/view_renderers.js"></script>
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --soft: #f6f7fb;
      --text: #172033;
      --muted: #6b7280;
      --line: #e6e8ef;
      --purple: #2563eb;
      --purple-soft: #eff6ff;
      --green: #0f9f78;
      --green-soft: #eafaf4;
      --amber: #c47a11;
      --amber-soft: #fff7e8;
      --rose: #d9354f;
      --blue: #2563eb;
      --shadow: 0 18px 46px rgba(31, 41, 55, .08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(37, 99, 235, .38) transparent;
    }
    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    *::-webkit-scrollbar-track {
      background: transparent;
    }
    *::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(37, 99, 235, .42), rgba(15, 159, 120, .38));
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(37, 99, 235, .72), rgba(15, 159, 120, .62));
      background-clip: padding-box;
    }
    html, body {
      height: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }
    button, select, input { font: inherit; }
    button { cursor: pointer; }
    .app {
      height: 100vh;
      min-height: 0;
      display: grid;
      grid-template-rows: 44px minmax(0, 1fr);
      background: #fff;
      overflow: hidden;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(16px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      letter-spacing: 0;
    }
    .brand h1 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
    }
    .brand p {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 11px;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .top-actions.hidden-top {
      display: none;
    }
    .pill {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      color: var(--text);
    }
    .shell {
      --sidebar-width: 16%;
      --main-width: 64%;
      --assistant-width: 20%;
      min-height: 0;
      height: calc(100vh - 44px);
      display: grid;
      grid-template-columns: var(--sidebar-width) 8px minmax(0, var(--main-width)) 8px var(--assistant-width);
      overflow: hidden;
    }
    .shell.theory {
      grid-template-columns: var(--sidebar-width) 8px minmax(0, 1fr);
    }
    .shell.theory .assistant,
    .shell.theory .splitter-right {
      display: none;
    }
    .sidebar {
      background: #fff;
      padding: 20px 14px;
      min-height: 0;
      height: 100%;
      overflow: auto;
    }
    .splitter {
      position: relative;
      z-index: 5;
      min-width: 8px;
      height: 100%;
      background: #fff;
      cursor: col-resize;
      touch-action: none;
    }
    .splitter::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 3px;
      width: 1px;
      background: var(--line);
      transition: background .16s ease, box-shadow .16s ease;
    }
    .splitter:hover::before,
    .splitter.dragging::before {
      background: rgba(91, 53, 245, .72);
      box-shadow: 0 0 0 2px rgba(91, 53, 245, .12);
    }
    body.resizing-shell {
      cursor: col-resize;
      user-select: none;
    }
    .main {
      min-width: 0;
      min-height: 0;
      height: 100%;
      background: linear-gradient(180deg, #fbfcff 0%, #f7f8fb 100%);
      overflow: auto;
      padding: 32px;
    }
    .assistant {
      background: #fff;
      padding: 28px 24px;
      min-height: 0;
      height: 100%;
      overflow: auto;
    }
    .nav-section {
      border-bottom: 1px solid var(--line);
      padding: 0 0 18px;
      margin-bottom: 18px;
    }
    .nav-section:last-of-type {
      margin-bottom: 0;
    }
    .nav-section-title {
      display: flex;
      align-items: center;
      font-size: 15px;
      font-weight: 900;
      color: #111827;
      min-height: 34px;
      margin-bottom: 10px;
      padding: 0 4px;
    }
    .chev {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      display: grid;
      place-items: center;
      transition: transform .18s ease;
    }
    details[open] > summary .chev { transform: rotate(90deg); }
    .step-list {
      position: relative;
      display: grid;
      gap: 6px;
      padding-left: 10px;
    }
    .step-list:before {
      content: "";
      position: absolute;
      left: 28px;
      top: 12px;
      bottom: 12px;
      width: 1px;
      background: #dbe3ef;
    }
    .nav-btn {
      position: relative;
      width: 100%;
      border: 0;
      background: transparent;
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 11px;
      align-items: center;
      text-align: left;
      min-height: 40px;
      padding: 9px 10px;
      color: var(--text);
      border-radius: 10px;
      transition: background .16s ease, color .16s ease, box-shadow .16s ease;
    }
    .nav-btn:focus,
    .nav-btn:focus-visible,
    details.nested-section summary:focus,
    details.nested-section summary:focus-visible {
      outline: none;
    }
    .nav-btn:hover {
      background: var(--purple-soft);
    }
    .dot {
      position: relative;
      z-index: 1;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid #cfd5df;
      background: #fff;
      margin-top: 0;
      transition: all .18s ease;
    }
    .nav-btn strong {
      display: block;
      font-size: 14px;
      line-height: 1.35;
    }
    .nav-btn > span:not(.dot) {
      display: block !important;
      min-width: 0;
    }
    .nav-btn > span:not(.dot) strong {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    .nav-btn > span:not(.dot) > span:not(.chev) {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 3px;
    }
    .nav-btn:hover strong { color: var(--purple); }
    .nav-btn:hover .dot {
      border-color: var(--purple);
    }
    .nav-btn.active .dot {
      border-color: var(--purple);
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    .nav-btn.active {
      background: var(--purple-soft);
    }
    .nav-btn.active strong { color: var(--purple); }
    .nav-subhead {
      margin: 8px 0 4px 32px;
      color: #111827;
      font-weight: 900;
      font-size: 13px;
    }
    details.nested-section {
      position: relative;
      padding: 0;
      margin: 0;
    }
    details.nested-section summary {
      list-style: none;
      display: grid;
      grid-template-columns: 18px 1fr 22px;
      align-items: center;
      gap: 11px;
      color: var(--text);
      cursor: pointer;
      min-height: 40px;
      border-radius: 10px;
      padding: 9px 10px;
      transition: background .16s ease, color .16s ease;
    }
    details.nested-section summary::-webkit-details-marker { display: none; }
    details.nested-section summary:hover {
      background: var(--purple-soft);
      color: var(--purple);
    }
    details.nested-section summary strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }
    details.nested-section summary span.sub {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 3px;
      font-weight: 400;
    }
    details.nested-section summary:hover .dot {
      border-color: var(--purple);
    }
    details.nested-section.active summary strong {
      color: var(--purple);
    }
    details.nested-section.active summary > .dot {
      border-color: var(--purple);
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    details.nested-section .step-list {
      padding-left: 18px;
      margin-top: 6px;
      gap: 6px;
    }
    details.nested-section:not([open]) .step-list {
      display: none;
      margin-top: 0;
    }
    details.nested-section .step-list:before {
      left: 36px;
      top: 8px;
      bottom: 8px;
    }
    details.nested-section .nav-btn {
      min-height: 38px;
      padding: 8px 10px;
    }
    details.nested-section .nav-btn strong {
      font-size: 14px;
    }
    details.nested-section .chev {
      margin-top: 0;
    }
    .hero-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px;
      margin-bottom: 20px;
    }
    .hero-line {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 22px;
      margin-bottom: 22px;
    }
    .eyebrow {
      color: var(--purple);
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .lead {
      margin: 10px 0 0;
      color: #4b5563;
      line-height: 1.75;
      max-width: 900px;
    }
    .primary-btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      color: #fff;
      background: linear-gradient(135deg, var(--purple), #1d4ed8);
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 12px 22px rgba(37, 99, 235, .22);
    }
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .stat-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      background: #fff;
      min-height: 112px;
    }
    .stat-card.purple { background: #eff6ff; }
    .stat-card.green { background: #effcf6; }
    .stat-card.amber { background: #fffaf0; }
    .stat-card span {
      display: block;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .stat-card strong {
      display: block;
      font-size: 34px;
      line-height: 1;
    }
    .content-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }
    .content-card p {
      margin: 10px 0;
      line-height: 1.9;
      color: #283449;
      font-size: 16px;
    }
    .html-lesson {
      margin-top: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
      padding: 0;
    }
    .html-lesson iframe {
      width: 100%;
      min-height: 120px;
      border: 0;
      background: #fff;
      display: block;
    }
    .formula {
      white-space: pre-wrap;
      font-family: Consolas, "Microsoft YaHei", monospace;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      line-height: 1.75;
      overflow: auto;
      color: #172033;
    }
    .formula-box {
      white-space: pre-wrap;
      font-family: Consolas, "Microsoft YaHei", monospace;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      line-height: 1.75;
      overflow: auto;
      color: #172033;
    }
    .best-param-panel {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .best-param {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcff;
      padding: 12px;
      min-width: 0;
    }
    .best-param span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .best-param strong {
      display: block;
      font-family: Consolas, "Microsoft YaHei", monospace;
      font-size: 17px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    @media (max-width: 860px) {
      .best-param-panel { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(520px, 100%), 1fr));
      gap: 18px;
      align-items: start;
    }
    .chart-grid.single {
      grid-template-columns: minmax(min(680px, 100%), 980px);
      justify-content: center;
    }
    .chart-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 455px;
      height: clamp(455px, 54vh, 620px);
      max-height: 820px;
      resize: none;
    }
    .chart-card.chart-interaction-prototype {
      transition: border-color .16s ease, box-shadow .16s ease;
    }
    .chart-card.chart-interaction-prototype.chart-active {
      border-color: rgba(91, 53, 245, .72);
      box-shadow: 0 0 0 3px rgba(91, 53, 245, .12), var(--shadow);
    }
    .chart-card::after {
      content: "";
      position: absolute;
      right: 10px;
      bottom: 9px;
      width: 18px;
      height: 18px;
      pointer-events: none;
      opacity: .42;
      background:
        linear-gradient(135deg, transparent 54%, #9aa3b2 56%, #9aa3b2 62%, transparent 64%),
        linear-gradient(135deg, transparent 68%, #9aa3b2 70%, #9aa3b2 76%, transparent 78%);
    }
    .chart-card.wide { grid-column: 1 / -1; }
    .chart-card.small {
      min-height: 340px;
      height: clamp(340px, 42vh, 480px);
    }
    .chart-head {
      padding: 16px 18px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .chart-title {
      font-weight: 900;
      font-size: 16px;
    }
    .chart-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .chart {
      width: 100%;
      height: 100%;
      min-height: 0;
    }
    .chart-grid.single .chart-card {
      min-height: 540px;
      height: clamp(540px, 66vh, 740px);
    }
    .chart-card.wide {
      min-height: 500px;
      height: clamp(500px, 58vh, 680px);
    }
    .info-card-body {
      min-height: 0;
      overflow: auto;
    }
    .chart-card.wide > div[style*="padding:18px"] {
      min-height: 0;
      overflow: auto;
    }
    .dashboard-grid {
      display: block;
      position: relative;
      min-height: 640px;
    }
    .dashboard-grid.grid-stack {
      width: 100%;
      overflow: visible;
    }
    .dashboard-grid.grid-stack > .grid-stack-item {
      position: absolute;
      min-width: 0;
    }
    .dashboard-grid .grid-stack-item-content {
      position: absolute;
      inset: 8px;
      overflow: visible;
    }
    .dashboard-grid .chart-card {
      height: 100%;
      min-height: 0;
      max-height: none;
      resize: none;
    }
    .dashboard-grid .chart-head {
      cursor: grab;
    }
    .dashboard-grid .chart-head:active {
      cursor: grabbing;
    }
    .dashboard-grid .ui-resizable-se {
      width: 34px;
      height: 34px;
      right: 4px;
      bottom: 4px;
      z-index: 8;
      background: transparent;
    }
    .dashboard-grid .ui-resizable-s {
      height: 16px;
      left: 20px;
      right: 20px;
      bottom: 0;
      cursor: ns-resize;
      z-index: 7;
    }
    .dashboard-grid .ui-resizable-e {
      width: 16px;
      top: 20px;
      right: 0;
      bottom: 20px;
      cursor: ew-resize;
      z-index: 7;
    }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="0"] { left: 0%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="1"] { left: 25%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="2"] { left: 50%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="3"] { left: 75%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="1"] { width: 25%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="2"] { width: 50%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="3"] { width: 75%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="4"] { width: 100%; }
    .empty-state {
      border: 1px dashed #cfd5df;
      border-radius: var(--radius);
      background: #fff;
      display: grid;
      place-items: center;
      min-height: 420px;
      text-align: center;
      color: var(--muted);
      padding: 30px;
    }
    .student-upload-empty {
      min-height: 300px;
      align-content: center;
    }
    .right-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      margin-bottom: 18px;
    }
    .right-title:before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    .helper-card, .control-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 16px;
      margin-bottom: 16px;
    }
    details.control-card summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    details.control-card summary::-webkit-details-marker { display: none; }
    details.control-card summary:after {
      content: "⌄";
      color: var(--muted);
      font-size: 18px;
      transition: transform .18s ease;
    }
    details.control-card[open] summary:after {
      transform: rotate(180deg);
    }
    .helper-card h3, .control-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    details.control-card summary h3 {
      margin: 0;
    }
    details.control-card[open] summary {
      margin-bottom: 10px;
    }
    .helper-card p {
      color: #4b5563;
      line-height: 1.75;
      margin: 0 0 10px;
      font-size: 14px;
    }
    .control-group {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcff;
      padding: 12px;
      margin-top: 14px;
    }
    .control-card.student-stage-card {
      background: #f8fbff;
      border-color: #dfe7f3;
    }
    .control-card.student-stage-card > summary {
      margin-bottom: 2px;
    }
    .control-group > label.control-label:first-of-type {
      margin-top: 0;
    }
    .control-group .field-grid label.control-label {
      margin-top: 0;
    }
    .mini-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .mini-stat {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fbfcff;
      text-align: center;
    }
    .mini-stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .mini-stat strong {
      display: block;
      font-size: 23px;
    }
    .model-status-empty {
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
    }
    .model-status-grid {
      display: grid;
      gap: 10px;
    }
    .model-status-grid span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .model-status-grid strong {
      display: block;
      color: var(--text);
      font-size: 14px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .model-status-main,
    .model-status-pair,
    .model-param-row > div {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      min-width: 0;
    }
    .model-status-pair {
      display: inline-block;
    }
    .model-param-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .model-param-row strong {
      font-family: Consolas, "Microsoft YaHei", monospace;
      font-size: 13px;
    }
    label.control-label {
      display: block;
      font-weight: 900;
      margin: 14px 0 8px;
      font-size: 13px;
    }
    select, input[type="number"] {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      outline: none;
      padding: 0 12px;
      color: var(--text);
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--purple);
    }
    .range-control {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 24px;
      align-items: center;
      gap: 8px;
    }
    .range-stepper {
      display: grid;
      gap: 3px;
    }
    .range-step-btn {
      width: 22px;
      height: 18px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
      display: grid;
      place-items: center;
      padding: 0;
      font-size: 10px;
      line-height: 1;
    }
    .range-step-btn:hover {
      border-color: #c9c1ff;
      background: var(--purple-soft);
      color: var(--purple);
    }
    .check-list {
      display: grid;
      gap: 8px;
    }
    details.mode-menu {
      position: relative;
    }
    details.mode-menu summary {
      list-style: none;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 900;
      color: var(--text);
    }
    details.mode-menu summary::-webkit-details-marker { display: none; }
    details.mode-menu summary:after {
      content: "⌄";
      color: var(--muted);
      font-size: 18px;
    }
    details.mode-menu[open] summary:after {
      transform: rotate(180deg);
    }
    details.mode-menu .check-list {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 8px;
      box-shadow: var(--shadow);
    }
    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      color: #273244;
      background: #fff;
      user-select: none;
    }
    .check-row input {
      width: 16px;
      height: 16px;
      accent-color: var(--purple);
    }
    .check-row:has(input:disabled) {
      opacity: .58;
      cursor: not-allowed;
    }
    .check-row:has(input:checked) {
      border-color: #bfdbfe;
      background: var(--purple-soft);
      color: #1e3a8a;
      font-weight: 800;
    }
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .range-line {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }
    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .btn-row {
      margin-top: 12px;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      color: #fff;
      height: 38px;
      font-weight: 900;
    }
    .btn.primary { background: var(--purple); }
    .btn.green { background: var(--green); }
    .btn.dark { background: #4b5563; }
    .btn.rose { background: var(--rose); }
    .runtime {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }
    .runtime div {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .runtime strong { color: var(--text); }
    .table-wrap {
      overflow: auto;
      max-height: 430px;
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    .table-note {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      white-space: nowrap;
      text-align: left;
    }
    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
    }
    .format-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      align-items: start;
    }
    .format-intro p {
      margin: 0 0 14px;
      color: #273244;
      line-height: 1.75;
    }
    .format-column {
      min-width: 0;
    }
    .format-point {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcff;
      padding: 12px;
      color: #273244;
      line-height: 1.65;
      margin-bottom: 12px;
    }
    .format-point strong {
      display: block;
      margin-bottom: 3px;
      color: #111827;
    }
    .format-upload-hint {
      margin-top: 22px;
      border: 1px dashed #bfdbfe;
      border-radius: 12px;
      background: #eff6ff;
      color: #1e3a8a;
      display: grid;
      place-items: center;
      min-height: 96px;
      text-align: center;
      font-weight: 800;
    }
    .sample-caption {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .status-line {
      margin-top: 12px;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      background: #eff6ff;
      color: #1e3a8a;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
    }
    .status-line.error {
      border-color: #fecdd3;
      background: #fff1f2;
      color: #9f1239;
    }
    .stage-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .stage-chip {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      min-width: 0;
    }
    .stage-chip span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      margin-bottom: 4px;
    }
    .stage-chip strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .stage-chip.active {
      border-color: #bfdbfe;
      background: var(--purple-soft);
      color: #1e3a8a;
    }
    .section-status {
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: #fff;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }
    .section-status.ready {
      border-color: #bbf7d0;
      color: #047857;
      background: #ecfdf5;
    }
    .section-status.warn {
      border-color: #fde68a;
      color: #92400e;
      background: #fffbeb;
    }
    .hidden { display: none !important; }
    .theory-assistant-fab {
      position: fixed;
      right: 46px;
      bottom: 18px;
      z-index: 50;
      width: 132px;
      height: 146px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #fff;
      display: grid;
      place-items: center;
      padding: 0;
      overflow: visible;
      box-shadow: none;
      transition: transform .18s ease, filter .18s ease;
      filter: drop-shadow(0 18px 26px rgba(15, 23, 42, .14));
    }
    .theory-assistant-fab:hover {
      transform: translateY(-2px);
      filter: drop-shadow(0 22px 30px rgba(15, 23, 42, .18));
    }
    .theory-assistant-fab:focus-visible {
      outline: 3px solid rgba(37, 99, 235, .34);
      outline-offset: 4px;
    }
    .digital-lecturer {
      --lecturer-width: 128px;
      --lecturer-height: 140px;
      position: relative;
      width: var(--lecturer-width);
      height: var(--lecturer-height);
      display: block;
      pointer-events: none;
    }
    .digital-lecturer-fab {
      --lecturer-width: 128px;
      --lecturer-height: 140px;
    }
    .digital-lecturer-mini {
      --lecturer-width: 38px;
      --lecturer-height: 42px;
    }
    .lecturer-gif-stage {
      position: absolute;
      inset: 0;
      overflow: visible;
      background: transparent;
      border: 0;
      box-shadow: none;
      animation: lecturer-gif-idle 4.8s ease-in-out infinite;
    }
    .lecturer-gif {
      position: absolute;
      left: 50%;
      bottom: -7%;
      width: 106%;
      height: auto;
      transform: translateX(-50%);
    }
    .digital-lecturer-mini .lecturer-gif-stage {
      overflow: visible;
    }
    @keyframes lecturer-gif-idle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    .theory-assistant-panel {
      position: fixed;
      right: 28px;
      bottom: 168px;
      z-index: 50;
      width: min(430px, calc(100vw - 32px));
      max-height: min(680px, calc(100vh - 170px));
      border: 1px solid rgba(191, 219, 254, .88);
      border-radius: 22px;
      background: rgba(255, 255, 255, .98);
      box-shadow: 0 28px 80px rgba(15, 23, 42, .18), 0 0 0 1px rgba(255, 255, 255, .82) inset;
      overflow: hidden;
      display: none;
    }
    .theory-assistant-panel.open {
      display: grid;
      grid-template-rows: auto auto auto auto minmax(0, 1fr) auto;
    }
    .theory-assistant-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 18px 14px;
      background:
        radial-gradient(circle at 16% 10%, rgba(167, 243, 208, .55), transparent 32%),
        linear-gradient(135deg, #eef6ff 0%, #ffffff 68%);
      border-bottom: 1px solid rgba(219, 234, 254, .9);
    }
    .theory-assistant-identity {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      min-width: 0;
    }
    .theory-assistant-mark {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: transparent;
      overflow: visible;
      filter: drop-shadow(0 8px 16px rgba(37, 99, 235, .14));
    }
    .theory-assistant-head strong {
      display: block;
      color: #111827;
      font-size: 16px;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .theory-assistant-identity > div > span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .theory-assistant-close {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, .82);
      color: #64748b;
      font-weight: 900;
    }
    .theory-assistant-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px 18px 10px;
      background: #fff;
    }
    .theory-assistant-actions button,
    .theory-assistant-ask-actions button,
    .theory-assistant-control button {
      min-height: 38px;
      border: 1px solid #dbe3ef;
      border-radius: 12px;
      background: #fff;
      color: #172033;
      font-size: 13px;
      font-weight: 900;
      transition: transform .14s ease, border-color .14s ease, background .14s ease, box-shadow .14s ease;
    }
    .theory-assistant-actions button:hover,
    .theory-assistant-ask-actions button:hover,
    .theory-assistant-control button:hover {
      border-color: #bfdbfe;
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(37, 99, 235, .10);
    }
    .theory-assistant-actions button.primary {
      border-color: transparent;
      background: linear-gradient(135deg, #2563eb, #0f766e);
      color: #fff;
    }
    .theory-assistant-voice {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px;
      gap: 10px;
      padding: 0 18px 12px;
      background: #fff;
    }
    .theory-assistant-voice label {
      display: grid;
      gap: 6px;
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
      min-width: 0;
    }
    .theory-assistant-voice label strong {
      float: right;
      color: #1e3a8a;
      font-size: 12px;
    }
    .theory-assistant-voice select,
    .theory-assistant-voice input {
      width: 100%;
      min-width: 0;
    }
    .theory-assistant-voice select {
      height: 36px;
      border: 1px solid #dbe3ef;
      border-radius: 11px;
      background: #f8fafc;
      color: #172033;
      padding: 0 10px;
      font: inherit;
      font-size: 12px;
      outline: none;
    }
    .theory-assistant-voice input {
      accent-color: #2563eb;
    }
    .theory-assistant-ask {
      display: grid;
      gap: 10px;
      padding: 12px 18px 14px;
      border-top: 1px solid rgba(226, 232, 240, .9);
      border-bottom: 1px solid rgba(226, 232, 240, .9);
      background: linear-gradient(180deg, #fff 0%, #f8fafc 100%);
    }
    .theory-assistant-ask textarea {
      width: 100%;
      resize: vertical;
      min-height: 54px;
      max-height: 96px;
      border: 1px solid #dbe3ef;
      border-radius: 13px;
      padding: 10px 12px;
      color: #172033;
      font: inherit;
      font-size: 13px;
      line-height: 1.5;
      outline: none;
    }
    .theory-assistant-ask textarea:focus {
      border-color: rgba(37, 99, 235, .45);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .10);
    }
    .theory-assistant-ask-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .theory-assistant-actions button:disabled,
    .theory-assistant-ask-actions button:disabled,
    .theory-assistant-control button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }
    .theory-assistant-body {
      min-height: 160px;
      overflow: auto;
      padding: 18px 20px;
      color: #263347;
      font-size: 14px;
      line-height: 1.85;
      white-space: pre-wrap;
      background: #fff;
    }
    .theory-assistant-control {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 12px 18px 16px;
      border-top: 1px solid rgba(226, 232, 240, .9);
      background: #f8fafc;
    }
    .theory-assistant-status {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    body:not(.has-theory-assistant) .theory-assistant-fab,
    body:not(.has-theory-assistant) .theory-assistant-panel {
      display: none !important;
    }
    @media (max-width: 1260px) {
      .shell {
        --sidebar-width: 240px;
        --assistant-width: 300px;
        grid-template-columns: var(--sidebar-width) 8px minmax(420px, 1fr) 8px var(--assistant-width);
      }
      .shell.theory {
        grid-template-columns: var(--sidebar-width) 8px minmax(0, 1fr);
      }
    }
    @media (max-width: 860px) {
      .app { grid-template-rows: auto minmax(0, 1fr); }
      .topbar { align-items: flex-start; flex-direction: column; padding: 18px; }
      .shell, .shell.theory, .chart-grid, .chart-grid.single, .stat-cards, .format-grid, .stage-strip { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .splitter { display: none; }
      .chart-card.wide { grid-column: auto; }
      .theory-assistant-fab {
        right: 28px;
        bottom: 16px;
      }
      .theory-assistant-panel {
        right: 16px;
        bottom: 160px;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .lecturer-gif-stage {
        animation: none !important;
      }
      .theory-assistant-fab,
      .theory-assistant-actions button,
      .theory-assistant-ask-actions button,
      .theory-assistant-control button {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="logo">ML</div>
      <div>
        <h1>简单线性回归教学实验</h1>
      </div>
    </div>
    <div class="top-actions hidden-top">
      <span class="pill" id="topFeature">当前特征 RM</span>
      <button class="primary-btn" type="button" id="jumpExperiment">开始实验</button>
    </div>
  </header>

  <div class="shell">
    <aside class="sidebar">
      <section class="nav-section">
        <div class="nav-section-title">理论部分</div>
        <div class="step-list">
          <button class="nav-btn" data-page="basic" type="button"><span class="dot"></span><span><strong>实验基本信息</strong><span>实验背景与任务</span></span></button>
          <button class="nav-btn" data-page="purpose" type="button"><span class="dot"></span><span><strong>实验目的</strong><span>你需要掌握什么</span></span></button>
          <button class="nav-btn" data-page="knowledge" type="button"><span class="dot"></span><span><strong>前置知识</strong><span>线性函数与误差</span></span></button>
          <details class="nested-section" open>
            <summary><span class="dot"></span><span><strong>模型介绍</strong><span class="sub">数据、模型和指标</span></span><span class="chev">›</span></summary>
            <div class="step-list">
              <button class="nav-btn" data-page="dataset" type="button"><span class="dot"></span><span><strong>数据集</strong><span>特征、标签和标准化</span></span></button>
              <button class="nav-btn" data-page="model" type="button"><span class="dot"></span><span><strong>训练模型</strong><span>y = wx + b</span></span></button>
              <button class="nav-btn" data-page="criterion" type="button"><span class="dot"></span><span><strong>学习准则</strong><span>MSE 损失函数</span></span></button>
              <button class="nav-btn" data-page="optimization" type="button"><span class="dot"></span><span><strong>参数优化</strong><span>梯度下降更新</span></span></button>
              <button class="nav-btn" data-page="evaluation" type="button"><span class="dot"></span><span><strong>评价指标</strong><span>RMSE、MAE、R 平方</span></span></button>
            </div>
          </details>
          <button class="nav-btn" data-page="result" type="button"><span class="dot"></span><span><strong>预期成果</strong><span>实验完成标准</span></span></button>
          <button class="nav-btn" data-page="thinking" type="button"><span class="dot"></span><span><strong>思考拓展</strong><span>从单特征到多特征</span></span></button>
        </div>
      </section>

      <section class="nav-section">
        <div class="nav-section-title">实验部分</div>
        <div class="step-list">
          <button class="nav-btn" data-page="preprocess" type="button"><span class="dot"></span><span><strong>数据预处理</strong><span>观察数据与相关性</span></span></button>
          <button class="nav-btn" data-page="train_eval" type="button"><span class="dot"></span><span><strong>模型训练与评估</strong><span>训练、优化和指标</span></span></button>
          <button class="nav-btn" data-page="predict" type="button"><span class="dot"></span><span><strong>模型预测</strong><span>输入样本并查看结果</span></span></button>
          <button class="nav-btn" data-page="student" type="button"><span class="dot"></span><span><strong>自主实验</strong><span>上传数据并完成训练</span></span></button>
        </div>
      </section>
    </aside>

    <div class="splitter splitter-left" data-resize-edge="left" role="separator" aria-orientation="vertical" aria-label="调整左侧导航宽度"></div>

    <main class="main" id="main"></main>

    <div class="splitter splitter-right" data-resize-edge="right" role="separator" aria-orientation="vertical" aria-label="调整右侧控制面板宽度"></div>

    <aside class="assistant">
      <div id="rightPanel"></div>
    </aside>
  </div>
</div>

<script>
const FEATURE_NAMES = {{ feature_names | tojson }};
const DEFAULT_FEATURE = {{ default_feature | tojson }};
</script>
<script src="/static/js/state_runtime.js"></script>
<script src="/static/js/schema_registry.js"></script>
<script src="/static/js/theory_page.js"></script>
<script src="/static/js/preprocess_page.js"></script>
<script src="/static/js/student_page.js"></script>
<script src="/static/js/predict_page.js"></script>
<script src="/static/js/train_page.js"></script>
<script src="/static/js/theory_assistant.js"></script>
<script src="/static/js/app_shell.js"></script>
</body>
</html>

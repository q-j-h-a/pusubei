<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简单线性回归教学实验</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2/dist/echarts-gl.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css">
  <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/chart_renderers.js"></script>
  <script src="/static/js/control_renderers.js"></script>
  <script src="/static/js/view_renderers.js"></script>
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --soft: #f6f7fb;
      --text: #172033;
      --muted: #6b7280;
      --line: #e6e8ef;
      --purple: #5b35f5;
      --purple-soft: #f1efff;
      --green: #0f9f78;
      --green-soft: #eafaf4;
      --amber: #c47a11;
      --amber-soft: #fff7e8;
      --rose: #d9354f;
      --blue: #2563eb;
      --shadow: 0 18px 46px rgba(31, 41, 55, .08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(91, 53, 245, .38) transparent;
    }
    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    *::-webkit-scrollbar-track {
      background: transparent;
    }
    *::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(91, 53, 245, .42), rgba(15, 159, 120, .38));
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(91, 53, 245, .72), rgba(15, 159, 120, .62));
      background-clip: padding-box;
    }
    html, body {
      height: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }
    button, select, input { font: inherit; }
    button { cursor: pointer; }
    .app {
      height: 100vh;
      min-height: 0;
      display: grid;
      grid-template-rows: 44px minmax(0, 1fr);
      background: #fff;
      overflow: hidden;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(16px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      letter-spacing: 0;
    }
    .brand h1 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
    }
    .brand p {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 11px;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .top-actions.hidden-top {
      display: none;
    }
    .pill {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      color: var(--text);
    }
    .shell {
      min-height: 0;
      height: calc(100vh - 44px);
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr) 320px;
      overflow: hidden;
    }
    .shell.theory {
      grid-template-columns: 250px minmax(0, 1fr);
    }
    .shell.theory .assistant {
      display: none;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: #fff;
      padding: 22px 16px;
      min-height: 0;
      height: 100%;
      overflow: auto;
    }
    .main {
      min-width: 0;
      min-height: 0;
      height: 100%;
      background: linear-gradient(180deg, #fbfcff 0%, #f7f8fb 100%);
      overflow: auto;
      padding: 32px;
    }
    .assistant {
      border-left: 1px solid var(--line);
      background: #fff;
      padding: 28px 24px;
      min-height: 0;
      height: 100%;
      overflow: auto;
    }
    details.nav-section {
      border-bottom: 1px solid var(--line);
      padding: 0 0 16px;
      margin-bottom: 18px;
    }
    details.nav-section summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 15px;
      font-weight: 900;
      color: #111827;
      margin-bottom: 14px;
    }
    details.nav-section summary::-webkit-details-marker { display: none; }
    .chev {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      display: grid;
      place-items: center;
      transition: transform .18s ease;
    }
    details[open] .chev { transform: rotate(90deg); }
    .step-list {
      position: relative;
      display: grid;
      gap: 0;
      padding-left: 14px;
    }
    .step-list:before {
      content: "";
      position: absolute;
      left: 10px;
      top: 14px;
      bottom: 14px;
      width: 1px;
      background: var(--line);
    }
    .nav-btn {
      position: relative;
      width: 100%;
      border: 0;
      background: transparent;
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 10px;
      align-items: start;
      text-align: left;
      padding: 10px 0;
      color: var(--text);
      border-radius: 12px;
    }
    .nav-btn:focus,
    .nav-btn:focus-visible,
    details.nested-section summary:focus,
    details.nested-section summary:focus-visible {
      outline: none;
    }
    .nav-btn:hover {
      background: var(--purple-soft);
    }
    .dot {
      position: relative;
      z-index: 1;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid #cfd5df;
      background: #fff;
      margin-top: 2px;
      transition: all .18s ease;
    }
    .nav-btn strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }
    .nav-btn > span:not(.dot) {
      display: block !important;
      min-width: 0;
    }
    .nav-btn > span:not(.dot) strong {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    .nav-btn > span:not(.dot) > span:not(.chev) {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 3px;
    }
    .nav-btn:hover strong { color: var(--purple); }
    .nav-btn:hover .dot {
      border-color: var(--purple);
    }
    .nav-btn.active .dot {
      border-color: var(--purple);
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    .nav-btn.active strong { color: var(--purple); }
    .nav-subhead {
      margin: 8px 0 4px 32px;
      color: #111827;
      font-weight: 900;
      font-size: 13px;
    }
    details.nested-section {
      position: relative;
      padding: 0;
      margin: 0;
    }
    details.nested-section summary {
      list-style: none;
      display: grid;
      grid-template-columns: 22px 1fr 22px;
      align-items: start;
      gap: 10px;
      color: var(--text);
      cursor: pointer;
      border-radius: 12px;
      padding: 10px 0 6px;
    }
    details.nested-section summary::-webkit-details-marker { display: none; }
    details.nested-section summary:hover {
      background: var(--purple-soft);
      color: var(--purple);
    }
    details.nested-section summary strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }
    details.nested-section summary span.sub {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 3px;
      font-weight: 400;
    }
    details.nested-section summary:hover .dot {
      border-color: var(--purple);
    }
    details.nested-section.active summary strong {
      color: var(--purple);
    }
    details.nested-section.active summary > .dot {
      border-color: var(--purple);
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    details.nested-section .step-list {
      padding-left: 22px;
      margin-top: 0;
      gap: 0;
    }
    details.nested-section .step-list:before {
      left: 18px;
      top: 6px;
    }
    details.nested-section .nav-btn {
      padding: 7px 0;
    }
    details.nested-section .nav-btn strong {
      font-size: 14px;
    }
    details.nested-section .chev {
      margin-top: 0;
    }
    .hero-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px;
      margin-bottom: 20px;
    }
    .hero-line {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 22px;
      margin-bottom: 22px;
    }
    .eyebrow {
      color: var(--purple);
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .lead {
      margin: 10px 0 0;
      color: #4b5563;
      line-height: 1.75;
      max-width: 900px;
    }
    .primary-btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      color: #fff;
      background: linear-gradient(135deg, var(--purple), #3919d8);
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 12px 22px rgba(91, 53, 245, .22);
    }
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .stat-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      background: #fff;
      min-height: 112px;
    }
    .stat-card.purple { background: #f7f5ff; }
    .stat-card.green { background: #effcf6; }
    .stat-card.amber { background: #fffaf0; }
    .stat-card span {
      display: block;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .stat-card strong {
      display: block;
      font-size: 34px;
      line-height: 1;
    }
    .content-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }
    .content-card p {
      margin: 10px 0;
      line-height: 1.9;
      color: #283449;
      font-size: 16px;
    }
    .html-lesson {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
      padding: 0;
    }
    .html-lesson iframe {
      width: 100%;
      min-height: 120px;
      border: 0;
      background: #fff;
      display: block;
    }
    .formula {
      white-space: pre-wrap;
      font-family: Consolas, "Microsoft YaHei", monospace;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      line-height: 1.75;
      overflow: auto;
      color: #172033;
    }
    .best-param-panel {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .best-param {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcff;
      padding: 12px;
      min-width: 0;
    }
    .best-param span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .best-param strong {
      display: block;
      font-family: Consolas, "Microsoft YaHei", monospace;
      font-size: 17px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    @media (max-width: 860px) {
      .best-param-panel { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(520px, 100%), 1fr));
      gap: 18px;
      align-items: start;
    }
    .chart-grid.single {
      grid-template-columns: minmax(min(680px, 100%), 980px);
      justify-content: center;
    }
    .chart-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 455px;
      height: clamp(455px, 54vh, 620px);
      max-height: 820px;
      resize: vertical;
    }
    .chart-card::after {
      content: "";
      position: absolute;
      right: 10px;
      bottom: 9px;
      width: 18px;
      height: 18px;
      pointer-events: none;
      opacity: .42;
      background:
        linear-gradient(135deg, transparent 54%, #9aa3b2 56%, #9aa3b2 62%, transparent 64%),
        linear-gradient(135deg, transparent 68%, #9aa3b2 70%, #9aa3b2 76%, transparent 78%);
    }
    .chart-card.wide { grid-column: 1 / -1; }
    .chart-card.small {
      min-height: 340px;
      height: clamp(340px, 42vh, 480px);
    }
    .chart-head {
      padding: 16px 18px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .chart-title {
      font-weight: 900;
      font-size: 16px;
    }
    .chart-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .chart {
      width: 100%;
      height: 100%;
      min-height: 0;
    }
    .chart-grid.single .chart-card {
      min-height: 540px;
      height: clamp(540px, 66vh, 740px);
    }
    .chart-card.wide {
      min-height: 500px;
      height: clamp(500px, 58vh, 680px);
    }
    .info-card-body {
      min-height: 0;
      overflow: auto;
    }
    .chart-card.wide > div[style*="padding:18px"] {
      min-height: 0;
      overflow: auto;
    }
    .dashboard-grid {
      display: block;
      position: relative;
      min-height: 640px;
    }
    .dashboard-grid.grid-stack {
      width: 100%;
      overflow: visible;
    }
    .dashboard-grid.grid-stack > .grid-stack-item {
      position: absolute;
      min-width: 0;
    }
    .dashboard-grid .grid-stack-item-content {
      position: absolute;
      inset: 8px;
      overflow: visible;
    }
    .dashboard-grid .chart-card {
      height: 100%;
      min-height: 0;
      max-height: none;
      resize: none;
    }
    .dashboard-grid .chart-head {
      cursor: grab;
    }
    .dashboard-grid .chart-head:active {
      cursor: grabbing;
    }
    .dashboard-grid .ui-resizable-se {
      width: 22px;
      height: 22px;
      right: 8px;
      bottom: 8px;
    }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="0"] { left: 0%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="1"] { left: 25%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="2"] { left: 50%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="3"] { left: 75%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="1"] { width: 25%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="2"] { width: 50%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="3"] { width: 75%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="4"] { width: 100%; }
    .empty-state {
      border: 1px dashed #cfd5df;
      border-radius: var(--radius);
      background: #fff;
      display: grid;
      place-items: center;
      min-height: 420px;
      text-align: center;
      color: var(--muted);
      padding: 30px;
    }
    .right-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      margin-bottom: 18px;
    }
    .right-title:before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    .helper-card, .control-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 16px;
      margin-bottom: 16px;
    }
    details.control-card summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    details.control-card summary::-webkit-details-marker { display: none; }
    details.control-card summary:after {
      content: "⌄";
      color: var(--muted);
      font-size: 18px;
      transition: transform .18s ease;
    }
    details.control-card[open] summary:after {
      transform: rotate(180deg);
    }
    .helper-card h3, .control-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    details.control-card summary h3 {
      margin: 0;
    }
    details.control-card[open] summary {
      margin-bottom: 10px;
    }
    .helper-card p {
      color: #4b5563;
      line-height: 1.75;
      margin: 0 0 10px;
      font-size: 14px;
    }
    .mini-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .mini-stat {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fbfcff;
      text-align: center;
    }
    .mini-stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .mini-stat strong {
      display: block;
      font-size: 23px;
    }
    label.control-label {
      display: block;
      font-weight: 900;
      margin: 14px 0 8px;
      font-size: 13px;
    }
    select, input[type="number"] {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      outline: none;
      padding: 0 12px;
      color: var(--text);
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--purple);
    }
    .check-list {
      display: grid;
      gap: 8px;
    }
    details.mode-menu {
      position: relative;
    }
    details.mode-menu summary {
      list-style: none;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 900;
      color: var(--text);
    }
    details.mode-menu summary::-webkit-details-marker { display: none; }
    details.mode-menu summary:after {
      content: "⌄";
      color: var(--muted);
      font-size: 18px;
    }
    details.mode-menu[open] summary:after {
      transform: rotate(180deg);
    }
    details.mode-menu .check-list {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 8px;
      box-shadow: var(--shadow);
    }
    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      color: #273244;
      background: #fff;
      user-select: none;
    }
    .check-row input {
      width: 16px;
      height: 16px;
      accent-color: var(--purple);
    }
    .check-row:has(input:disabled) {
      opacity: .58;
      cursor: not-allowed;
    }
    .check-row:has(input:checked) {
      border-color: #c9c1ff;
      background: var(--purple-soft);
      color: #321aa2;
      font-weight: 800;
    }
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .range-line {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }
    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      color: #fff;
      height: 38px;
      font-weight: 900;
    }
    .btn.primary { background: var(--purple); }
    .btn.green { background: var(--green); }
    .btn.dark { background: #4b5563; }
    .btn.rose { background: var(--rose); }
    .runtime {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }
    .runtime div {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .runtime strong { color: var(--text); }
    .table-wrap {
      overflow: auto;
      max-height: 430px;
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    .table-note {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      white-space: nowrap;
      text-align: left;
    }
    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
    }
    .format-grid {
      display: grid;
      grid-template-columns: minmax(0, .86fr) minmax(360px, 1.14fr);
      gap: 18px;
      align-items: start;
    }
    .format-points {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .format-point {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcff;
      padding: 12px;
      color: #273244;
      line-height: 1.65;
    }
    .format-point strong {
      display: block;
      margin-bottom: 3px;
      color: #111827;
    }
    .sample-caption {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .status-line {
      margin-top: 12px;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      background: #eff6ff;
      color: #1e3a8a;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
    }
    .status-line.error {
      border-color: #fecdd3;
      background: #fff1f2;
      color: #9f1239;
    }
    .stage-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .stage-chip {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      min-width: 0;
    }
    .stage-chip span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      margin-bottom: 4px;
    }
    .stage-chip strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .stage-chip.active {
      border-color: #c9c1ff;
      background: var(--purple-soft);
      color: #321aa2;
    }
    .section-status {
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: #fff;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }
    .section-status.ready {
      border-color: #bbf7d0;
      color: #047857;
      background: #ecfdf5;
    }
    .section-status.warn {
      border-color: #fde68a;
      color: #92400e;
      background: #fffbeb;
    }
    .hidden { display: none !important; }
    @media (max-width: 1260px) {
      .shell { grid-template-columns: 240px minmax(0, 1fr); }
      .shell.theory { grid-template-columns: 240px minmax(0, 1fr); }
      .assistant { grid-column: 1 / -1; border-left: 0; border-top: 1px solid var(--line); }
    }
    @media (max-width: 860px) {
      .app { grid-template-rows: auto minmax(0, 1fr); }
      .topbar { align-items: flex-start; flex-direction: column; padding: 18px; }
      .shell, .shell.theory, .chart-grid, .chart-grid.single, .stat-cards, .format-grid, .stage-strip { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .chart-card.wide { grid-column: auto; }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="logo">ML</div>
      <div>
        <h1>简单线性回归教学实验</h1>
        <p>机器学习基础实验 / Boston Housing 房价预测</p>
      </div>
    </div>
    <div class="top-actions hidden-top">
      <span class="pill" id="topFeature">当前特征 RM</span>
      <button class="primary-btn" type="button" id="jumpExperiment">开始实验</button>
    </div>
  </header>

  <div class="shell">
    <aside class="sidebar">
      <details class="nav-section" open>
        <summary>理论部分 <span class="chev">›</span></summary>
        <div class="step-list">
          <button class="nav-btn" data-page="basic" type="button"><span class="dot"></span><span><strong>实验基本信息</strong><span>实验背景与任务</span></span></button>
          <button class="nav-btn" data-page="purpose" type="button"><span class="dot"></span><span><strong>实验目的</strong><span>你需要掌握什么</span></span></button>
          <button class="nav-btn" data-page="knowledge" type="button"><span class="dot"></span><span><strong>前置知识</strong><span>线性函数与误差</span></span></button>
          <details class="nested-section" open>
            <summary><span class="dot"></span><span><strong>模型介绍</strong><span class="sub">数据、模型和指标</span></span><span class="chev">›</span></summary>
            <div class="step-list">
              <button class="nav-btn" data-page="dataset" type="button"><span class="dot"></span><span><strong>数据集</strong><span>特征、标签和标准化</span></span></button>
              <button class="nav-btn" data-page="model" type="button"><span class="dot"></span><span><strong>训练模型</strong><span>y = wx + b</span></span></button>
              <button class="nav-btn" data-page="criterion" type="button"><span class="dot"></span><span><strong>学习准则</strong><span>MSE 损失函数</span></span></button>
              <button class="nav-btn" data-page="optimization" type="button"><span class="dot"></span><span><strong>参数优化</strong><span>梯度下降更新</span></span></button>
              <button class="nav-btn" data-page="evaluation" type="button"><span class="dot"></span><span><strong>评价指标</strong><span>RMSE、MAE、R 平方</span></span></button>
            </div>
          </details>
          <button class="nav-btn" data-page="result" type="button"><span class="dot"></span><span><strong>预期成果</strong><span>实验完成标准</span></span></button>
          <button class="nav-btn" data-page="thinking" type="button"><span class="dot"></span><span><strong>思考拓展</strong><span>从单特征到多特征</span></span></button>
        </div>
      </details>

      <details class="nav-section" open>
        <summary>实验部分 <span class="chev">›</span></summary>
        <div class="step-list">
          <button class="nav-btn" data-page="preprocess" type="button"><span class="dot"></span><span><strong>数据预处理</strong><span>观察数据与相关性</span></span></button>
          <button class="nav-btn" data-page="train_eval" type="button"><span class="dot"></span><span><strong>模型训练与评估</strong><span>训练、优化和指标</span></span></button>
          <button class="nav-btn" data-page="predict" type="button"><span class="dot"></span><span><strong>模型预测</strong><span>输入样本并查看结果</span></span></button>
          <button class="nav-btn" data-page="student" type="button"><span class="dot"></span><span><strong>自主实验</strong><span>上传数据并完成训练</span></span></button>
        </div>
      </details>
    </aside>

    <main class="main" id="main"></main>

    <aside class="assistant">
      <div id="rightPanel"></div>
    </aside>
  </div>
</div>

<script>
const FEATURE_NAMES = {{ feature_names | tojson }};
const DEFAULT_FEATURE = {{ default_feature | tojson }};
</script>
<script src="/static/js/state_runtime.js"></script>
<script src="/static/js/schema_registry.js"></script>
<script src="/static/js/theory_page.js"></script>
<script src="/static/js/preprocess_page.js"></script>
<script src="/static/js/student_page.js"></script>
<script src="/static/js/predict_page.js"></script>
<script src="/static/js/train_page.js"></script>
<script src="/static/js/app_shell.js"></script>
</body>
</html>

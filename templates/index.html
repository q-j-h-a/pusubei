<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简单线性回归教学实验</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2/dist/echarts-gl.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css">
  <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/chart_renderers.js"></script>
  <script src="/static/js/control_renderers.js"></script>
  <script src="/static/js/view_renderers.js"></script>
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --soft: #f6f7fb;
      --text: #172033;
      --muted: #6b7280;
      --line: #e6e8ef;
      --purple: #2563eb;
      --purple-soft: #eff6ff;
      --green: #0f9f78;
      --green-soft: #eafaf4;
      --amber: #c47a11;
      --amber-soft: #fff7e8;
      --rose: #d9354f;
      --blue: #2563eb;
      --shadow: 0 18px 46px rgba(31, 41, 55, .08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(37, 99, 235, .38) transparent;
    }
    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    *::-webkit-scrollbar-track {
      background: transparent;
    }
    *::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(37, 99, 235, .42), rgba(15, 159, 120, .38));
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(37, 99, 235, .72), rgba(15, 159, 120, .62));
      background-clip: padding-box;
    }
    html, body {
      height: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }
    button, select, input, textarea { font: inherit; }
    button { cursor: pointer; }
    .app {
      height: 100vh;
      min-height: 0;
      display: grid;
      grid-template-rows: 44px minmax(0, 1fr);
      background: #fff;
      overflow: hidden;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(16px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      letter-spacing: 0;
    }
    .brand h1 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
    }
    .brand p {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 11px;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .top-actions.hidden-top {
      display: none;
    }
    .pill {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      color: var(--text);
    }
    .shell {
      --sidebar-width: 16%;
      --main-width: 64%;
      --assistant-width: 20%;
      min-height: 0;
      height: calc(100vh - 44px);
      display: grid;
      grid-template-columns: var(--sidebar-width) 8px minmax(0, var(--main-width)) 8px var(--assistant-width);
      overflow: hidden;
    }
    .shell.theory {
      grid-template-columns: var(--sidebar-width) 8px minmax(0, 1fr);
    }
    .shell.theory .assistant,
    .shell.theory .splitter-right {
      display: none;
    }
    .sidebar {
      background: #fff;
      padding: 20px 14px;
      min-height: 0;
      height: 100%;
      overflow: auto;
    }
    .splitter {
      position: relative;
      z-index: 5;
      min-width: 8px;
      height: 100%;
      background: #fff;
      cursor: col-resize;
      touch-action: none;
    }
    .splitter::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 3px;
      width: 1px;
      background: var(--line);
      transition: background .16s ease, box-shadow .16s ease;
    }
    .splitter:hover::before,
    .splitter.dragging::before {
      background: rgba(91, 53, 245, .72);
      box-shadow: 0 0 0 2px rgba(91, 53, 245, .12);
    }
    body.resizing-shell {
      cursor: col-resize;
      user-select: none;
    }
    .main {
      min-width: 0;
      min-height: 0;
      height: 100%;
      background: linear-gradient(180deg, #fbfcff 0%, #f7f8fb 100%);
      overflow: auto;
      padding: 32px;
    }
    .assistant {
      background: #fff;
      padding: 28px 24px;
      min-height: 0;
      height: 100%;
      overflow: auto;
    }
    .nav-section {
      border-bottom: 1px solid var(--line);
      padding: 0 0 18px;
      margin-bottom: 18px;
    }
    .nav-section:last-of-type {
      margin-bottom: 0;
    }
    .nav-section-title {
      display: flex;
      align-items: center;
      font-size: 15px;
      font-weight: 900;
      color: #111827;
      min-height: 34px;
      margin-bottom: 10px;
      padding: 0 4px;
    }
    .chev {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      display: grid;
      place-items: center;
      transition: transform .18s ease;
    }
    details[open] > summary .chev { transform: rotate(90deg); }
    .step-list {
      position: relative;
      display: grid;
      gap: 6px;
      padding-left: 10px;
    }
    .step-list:before {
      content: "";
      position: absolute;
      left: 28px;
      top: 12px;
      bottom: 12px;
      width: 1px;
      background: #dbe3ef;
    }
    .nav-btn {
      position: relative;
      width: 100%;
      border: 0;
      background: transparent;
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 11px;
      align-items: center;
      text-align: left;
      min-height: 40px;
      padding: 9px 10px;
      color: var(--text);
      border-radius: 10px;
      transition: background .16s ease, color .16s ease, box-shadow .16s ease;
    }
    .nav-btn:focus,
    .nav-btn:focus-visible,
    details.nested-section summary:focus,
    details.nested-section summary:focus-visible {
      outline: none;
    }
    .nav-btn:hover {
      background: var(--purple-soft);
    }
    .dot {
      position: relative;
      z-index: 1;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid #cfd5df;
      background: #fff;
      margin-top: 0;
      transition: all .18s ease;
    }
    .nav-btn strong {
      display: block;
      font-size: 14px;
      line-height: 1.35;
    }
    .nav-btn > span:not(.dot) {
      display: block !important;
      min-width: 0;
    }
    .nav-btn > span:not(.dot) strong {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    .nav-btn > span:not(.dot) > span:not(.chev) {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 3px;
    }
    .nav-btn:hover strong { color: var(--purple); }
    .nav-btn:hover .dot {
      border-color: var(--purple);
    }
    .nav-btn.active .dot {
      border-color: var(--purple);
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    .nav-btn.active {
      background: var(--purple-soft);
    }
    .nav-btn.active strong { color: var(--purple); }
    .nav-subhead {
      margin: 8px 0 4px 32px;
      color: #111827;
      font-weight: 900;
      font-size: 13px;
    }
    details.nested-section {
      position: relative;
      padding: 0;
      margin: 0;
    }
    details.nested-section summary {
      list-style: none;
      display: grid;
      grid-template-columns: 18px 1fr 22px;
      align-items: center;
      gap: 11px;
      color: var(--text);
      cursor: pointer;
      min-height: 40px;
      border-radius: 10px;
      padding: 9px 10px;
      transition: background .16s ease, color .16s ease;
    }
    details.nested-section summary::-webkit-details-marker { display: none; }
    details.nested-section summary:hover {
      background: var(--purple-soft);
      color: var(--purple);
    }
    details.nested-section summary strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }
    details.nested-section summary span.sub {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 3px;
      font-weight: 400;
    }
    details.nested-section summary:hover .dot {
      border-color: var(--purple);
    }
    details.nested-section.active summary strong {
      color: var(--purple);
    }
    details.nested-section.active summary > .dot {
      border-color: var(--purple);
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    details.nested-section .step-list {
      padding-left: 18px;
      margin-top: 6px;
      gap: 6px;
    }
    details.nested-section:not([open]) .step-list {
      display: none;
      margin-top: 0;
    }
    details.nested-section .step-list:before {
      left: 36px;
      top: 8px;
      bottom: 8px;
    }
    details.nested-section .nav-btn {
      min-height: 38px;
      padding: 8px 10px;
    }
    details.nested-section .nav-btn strong {
      font-size: 14px;
    }
    details.nested-section .chev {
      margin-top: 0;
    }
    .hero-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px;
      margin-bottom: 20px;
    }
    .hero-line {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 22px;
      margin-bottom: 22px;
    }
    .eyebrow {
      color: var(--purple);
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .lead {
      margin: 10px 0 0;
      color: #4b5563;
      line-height: 1.75;
      max-width: 900px;
    }
    .primary-btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      color: #fff;
      background: linear-gradient(135deg, var(--purple), #1d4ed8);
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 12px 22px rgba(37, 99, 235, .22);
    }
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .stat-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      background: #fff;
      min-height: 112px;
    }
    .stat-card.purple { background: #eff6ff; }
    .stat-card.green { background: #effcf6; }
    .stat-card.amber { background: #fffaf0; }
    .stat-card span {
      display: block;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .stat-card strong {
      display: block;
      font-size: 34px;
      line-height: 1;
    }
    .content-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }
    .content-card p {
      margin: 10px 0;
      line-height: 1.9;
      color: #283449;
      font-size: 16px;
    }
    .html-lesson {
      margin-top: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
      padding: 0;
    }
    .html-lesson iframe {
      width: 100%;
      min-height: 120px;
      border: 0;
      background: #fff;
      display: block;
    }
    .formula {
      white-space: pre-wrap;
      font-family: Consolas, "Microsoft YaHei", monospace;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      line-height: 1.75;
      overflow: auto;
      color: #172033;
    }
    .formula-box {
      white-space: pre-wrap;
      font-family: Consolas, "Microsoft YaHei", monospace;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      line-height: 1.75;
      overflow: auto;
      color: #172033;
    }
    .best-param-panel {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .best-param {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcff;
      padding: 12px;
      min-width: 0;
    }
    .best-param span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .best-param strong {
      display: block;
      font-family: Consolas, "Microsoft YaHei", monospace;
      font-size: 17px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    @media (max-width: 860px) {
      .best-param-panel { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(520px, 100%), 1fr));
      gap: 18px;
      align-items: start;
    }
    .chart-grid.single {
      grid-template-columns: minmax(min(680px, 100%), 980px);
      justify-content: center;
    }
    .chart-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 455px;
      height: clamp(455px, 54vh, 620px);
      max-height: 820px;
      resize: none;
    }
    .chart-card.chart-interaction-prototype {
      transition: border-color .16s ease, box-shadow .16s ease;
    }
    .chart-card.chart-interaction-prototype.chart-active {
      border-color: rgba(91, 53, 245, .72);
      box-shadow: 0 0 0 3px rgba(91, 53, 245, .12), var(--shadow);
    }
    .chart-card::after {
      content: "";
      position: absolute;
      right: 10px;
      bottom: 9px;
      width: 18px;
      height: 18px;
      pointer-events: none;
      opacity: .42;
      background:
        linear-gradient(135deg, transparent 54%, #9aa3b2 56%, #9aa3b2 62%, transparent 64%),
        linear-gradient(135deg, transparent 68%, #9aa3b2 70%, #9aa3b2 76%, transparent 78%);
    }
    .chart-card.wide { grid-column: 1 / -1; }
    .chart-card.small {
      min-height: 340px;
      height: clamp(340px, 42vh, 480px);
    }
    .chart-head {
      padding: 16px 18px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .chart-title {
      font-weight: 900;
      font-size: 16px;
    }
    .chart-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .chart {
      width: 100%;
      height: 100%;
      min-height: 0;
    }
    .chart-grid.single .chart-card {
      min-height: 540px;
      height: clamp(540px, 66vh, 740px);
    }
    .chart-card.wide {
      min-height: 500px;
      height: clamp(500px, 58vh, 680px);
    }
    .info-card-body {
      min-height: 0;
      overflow: auto;
    }
    .chart-card.wide > div[style*="padding:18px"] {
      min-height: 0;
      overflow: auto;
    }
    .dashboard-grid {
      display: block;
      position: relative;
      min-height: 640px;
    }
    .dashboard-grid.grid-stack {
      width: 100%;
      overflow: visible;
    }
    .dashboard-grid.grid-stack > .grid-stack-item {
      position: absolute;
      min-width: 0;
    }
    .dashboard-grid .grid-stack-item-content {
      position: absolute;
      inset: 8px;
      overflow: visible;
    }
    .dashboard-grid .chart-card {
      height: 100%;
      min-height: 0;
      max-height: none;
      resize: none;
    }
    .dashboard-grid .chart-head {
      cursor: grab;
    }
    .dashboard-grid .chart-head:active {
      cursor: grabbing;
    }
    .dashboard-grid .ui-resizable-se {
      width: 34px;
      height: 34px;
      right: 4px;
      bottom: 4px;
      z-index: 8;
      background: transparent;
    }
    .dashboard-grid .ui-resizable-s {
      height: 16px;
      left: 20px;
      right: 20px;
      bottom: 0;
      cursor: ns-resize;
      z-index: 7;
    }
    .dashboard-grid .ui-resizable-e {
      width: 16px;
      top: 20px;
      right: 0;
      bottom: 20px;
      cursor: ew-resize;
      z-index: 7;
    }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="0"] { left: 0%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="1"] { left: 25%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="2"] { left: 50%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="3"] { left: 75%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="1"] { width: 25%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="2"] { width: 50%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="3"] { width: 75%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="4"] { width: 100%; }
    .empty-state {
      border: 1px dashed #cfd5df;
      border-radius: var(--radius);
      background: #fff;
      display: grid;
      place-items: center;
      min-height: 420px;
      text-align: center;
      color: var(--muted);
      padding: 30px;
    }
    .student-upload-empty {
      min-height: 300px;
      align-content: center;
    }
    .right-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      margin-bottom: 18px;
    }
    .right-title:before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    .helper-card, .control-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 16px;
      margin-bottom: 16px;
    }
    details.control-card summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    details.control-card summary::-webkit-details-marker { display: none; }
    details.control-card summary:after {
      content: "⌄";
      color: var(--muted);
      font-size: 18px;
      transition: transform .18s ease;
    }
    details.control-card[open] summary:after {
      transform: rotate(180deg);
    }
    .helper-card h3, .control-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    details.control-card summary h3 {
      margin: 0;
    }
    details.control-card[open] summary {
      margin-bottom: 10px;
    }
    .helper-card p {
      color: #4b5563;
      line-height: 1.75;
      margin: 0 0 10px;
      font-size: 14px;
    }
    .control-group {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcff;
      padding: 12px;
      margin-top: 14px;
    }
    .control-card.student-stage-card {
      background: #f8fbff;
      border-color: #dfe7f3;
    }
    .control-card.student-stage-card > summary {
      margin-bottom: 2px;
    }
    .control-group > label.control-label:first-of-type {
      margin-top: 0;
    }
    .control-group .field-grid label.control-label {
      margin-top: 0;
    }
    .mini-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .mini-stat {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fbfcff;
      text-align: center;
    }
    .mini-stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .mini-stat strong {
      display: block;
      font-size: 23px;
    }
    .model-status-empty {
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
    }
    .model-status-grid {
      display: grid;
      gap: 10px;
    }
    .model-status-grid span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .model-status-grid strong {
      display: block;
      color: var(--text);
      font-size: 14px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .model-status-main,
    .model-status-pair,

    }
    .theory-assistant-panel[data-mode="ask"]::before,
    .theory-assistant-panel[data-mode="explain"]::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      z-index: 3;
      height: 72px;
      pointer-events: none;
      background: linear-gradient(180deg, #fff 0%, rgba(255, 255, 255, .94) 42%, rgba(255, 255, 255, 0) 100%);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 58%, transparent 100%);
      mask-image: linear-gradient(180deg, #000 0%, #000 58%, transparent 100%);
    }
    .theory-assistant-panel[data-mode="explain"] .theory-assistant-head,
    .theory-assistant-panel[data-mode="explain"] .theory-live-stage,
    .theory-assistant-panel[data-mode="explain"] .theory-assistant-actions,
    .theory-assistant-panel[data-mode="explain"] .theory-assistant-ask,
    .theory-assistant-panel[data-mode="explain"] .theory-assistant-control,
    .theory-assistant-panel[data-mode="ask"] .theory-assistant-head,
    .theory-assistant-panel[data-mode="ask"] .theory-live-stage,
    .theory-assistant-panel[data-mode="ask"] .theory-assistant-actions,
    .theory-assistant-panel[data-mode="ask"] .theory-assistant-control {
      display: none !important;
    }
    .theory-assistant-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px 13px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border-bottom: 1px solid rgba(226, 232, 240, .92);
    }
    .theory-assistant-identity {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      min-width: 0;
    }
    .theory-assistant-mark {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: transparent;
      overflow: visible;
      filter: drop-shadow(0 8px 16px rgba(37, 99, 235, .14));
    }
    .theory-assistant-eyebrow {
      display: block;
      margin-bottom: 1px;
      color: #2563eb;
      font-size: 10px;
      font-weight: 950;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .theory-assistant-head strong {
      display: block;
      color: #111827;
      font-size: 16px;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .theory-assistant-identity > div > span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .theory-live-stage {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) 74px;
      gap: 14px;
      align-items: center;
      padding: 14px 18px;
      background: #f8fafc;
      border-bottom: 1px solid rgba(226, 232, 240, .92);
    }
    .digital-lecturer-panel {
      --lecturer-width: 86px;
      --lecturer-height: 98px;
      justify-self: center;
    }
    .theory-live-copy {
      min-width: 0;
    }
    .theory-live-copy span {
      display: block;
      color: #64748b;
      font-size: 12px;
      font-weight: 850;
      line-height: 1.35;
    }
    .theory-live-copy strong {
      display: block;
      margin-top: 4px;
      color: #0f172a;
      font-size: 18px;
      line-height: 1.25;
    }
    .theory-live-copy em {
      display: block;
      margin-top: 7px;
      color: #475569;
      font-size: 12px;
      font-style: normal;
      line-height: 1.45;
    }
    .theory-live-copy em[hidden] {
      display: none;
    }
    .theory-voice-meter {
      height: 44px;
      display: grid;
      grid-template-columns: repeat(5, 6px);
      gap: 5px;
      align-items: center;
      justify-content: end;
    }
    .theory-voice-meter span {
      width: 6px;
      height: 18px;
      border-radius: 999px;
      background: #cbd5e1;
      transform-origin: center;
    }
    .theory-voice-meter span:nth-child(2) { height: 28px; }
    .theory-voice-meter span:nth-child(3) { height: 38px; }
    .theory-voice-meter span:nth-child(4) { height: 26px; }
    body.assistant-speaking .theory-voice-meter span {
      background: #2563eb;
      animation: theory-meter 1.05s ease-in-out infinite;
    }
    body.assistant-speaking .theory-voice-meter span:nth-child(2) { animation-delay: .08s; }
    body.assistant-speaking .theory-voice-meter span:nth-child(3) { animation-delay: .16s; }
    body.assistant-speaking .theory-voice-meter span:nth-child(4) { animation-delay: .24s; }
    body.assistant-speaking .theory-voice-meter span:nth-child(5) { animation-delay: .32s; }
    @keyframes theory-meter {
      0%, 100% { transform: scaleY(.48); opacity: .58; }
      50% { transform: scaleY(1); opacity: 1; }
    }
    .theory-assistant-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 18px 10px;
      background: #fff;
    }
    .theory-assistant-actions button,
    .theory-assistant-ask button,
    .theory-assistant-control button {
      min-height: 38px;
      border: 1px solid #dbe3ef;
      border-radius: 13px;
      background: #fff;
      color: #172033;
      font-size: 12px;
      font-weight: 900;
      transition: transform .14s ease, border-color .14s ease, background .14s ease, box-shadow .14s ease;
    }
    .theory-assistant-actions button:hover,
    .theory-assistant-ask button:hover,
    .theory-assistant-control button:hover {
      border-color: #bfdbfe;
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(37, 99, 235, .10);
    }
    body.assistant-speaking #theoryReadBtn {
      position: relative;
      padding-left: 32px;
      border-color: #111827;
      background: #111827;
      color: #fff;
    }
    body.assistant-speaking #theoryReadBtn::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 50%;
      width: 12px;
      height: 12px;
      margin-top: -6px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, .38);
      border-top-color: #fff;
      animation: read-button-spin .86s linear infinite;
    }
    @keyframes read-button-spin {
      to { transform: rotate(360deg); }
    }
    .theory-assistant-voice {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 148px;
      gap: 10px;
      padding: 0;
    }
    .theory-assistant-voice[hidden] {
      display: none !important;
    }
    .theory-assistant-voice label {
      display: grid;
      gap: 6px;
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
      min-width: 0;
    }
    .theory-assistant-voice label strong {
      float: right;
      color: #1e3a8a;
      font-size: 12px;
    }
    .theory-assistant-voice select,
    .theory-assistant-voice input {
      width: 100%;
      min-width: 0;
    }
    .theory-assistant-voice select {
      height: 36px;
      border: 1px solid #dbe3ef;
      border-radius: 11px;
      background: #fff;
      color: #172033;
      padding: 0 10px;
      font: inherit;
      font-size: 12px;
      outline: none;
    }
    .theory-assistant-voice input {
      accent-color: #2563eb;
    }
    .theory-assistant-ask {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 72px;
      gap: 8px;
      padding: 0 18px 12px;
      background: #fff;
      align-items: end;
    }
    .theory-assistant-panel[data-mode="ask"] .theory-assistant-ask {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 20px;
      z-index: 4;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 56px;
      gap: 12px;
      padding: 0;
      align-items: stretch;
      background: transparent;
      pointer-events: none;
    }
    .theory-assistant-ask textarea {
      width: 100%;
      resize: vertical;
      min-height: 52px;
      max-height: 104px;
      border: 1px solid #dbe3ef;
      border-radius: 13px;
      padding: 10px 12px;
      color: #172033;
      font: inherit;
      font-size: 13px;
      line-height: 1.5;
      outline: none;
    }
    .theory-assistant-panel[data-mode="ask"] .theory-assistant-ask textarea {
      resize: none;
      height: 56px;
      min-height: 56px;
      max-height: 120px;
      border-radius: 20px;
      padding: 16px 18px;
      background: rgba(248, 250, 252, .96);
      border-color: #d9e2ef;
      font-size: 14px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, .14), inset 0 1px 0 rgba(255, 255, 255, .86);
      pointer-events: auto;
    }
    .theory-assistant-ask textarea:focus {
      border-color: rgba(37, 99, 235, .45);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .10);
    }
    .theory-assistant-panel[data-mode="ask"] .theory-assistant-ask button {
      width: 56px;
      min-width: 56px;
      height: 56px;
      min-height: 56px;
      border-radius: 999px;
      border-color: #d9e2ef;
      background: rgba(248, 250, 252, .96);
      color: #64748b;
      font-size: 0;
      position: relative;
      box-shadow: 0 18px 40px rgba(15, 23, 42, .14), inset 0 1px 0 rgba(255, 255, 255, .86);
      pointer-events: auto;
    }
    .theory-assistant-panel[data-mode="ask"] .theory-assistant-ask button::before {
      content: "↑";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 20px;
      line-height: 1;
    }
    .theory-assistant-panel[data-mode="ask"] .theory-assistant-ask button:hover {
      border-color: rgba(37, 99, 235, .45);
      background: rgba(248, 250, 252, .96);
      color: #334155;
      box-shadow: 0 18px 40px rgba(15, 23, 42, .14), 0 0 0 3px rgba(37, 99, 235, .10);
    }
    .theory-assistant-panel[data-mode="ask"] .theory-assistant-ask button:disabled {
      border-color: #e2e8f0;
      background: rgba(248, 250, 252, .78);
      color: #94a3b8;
      opacity: 1;
    }
    .theory-assistant-actions button:disabled,
    .theory-assistant-ask button:disabled,
    .theory-assistant-control button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }
    .theory-assistant-body {
      overflow: auto;
      margin: 0;
      padding: 18px 20px 16px;
      color: #1f2937;
      font-size: 14px;
      line-height: 1.78;
      white-space: pre-wrap;
      background: #fff;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .theory-assistant-body::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }
    .theory-assistant-panel[data-mode="explain"] .theory-assistant-body,
    .theory-assistant-panel[data-mode="ask"] .theory-assistant-body {
      padding: 54px 24px 110px;
      min-height: 180px;
      font-size: 15px;
      line-height: 1.8;
    }
    .theory-conversation {
      display: grid;
      gap: 18px;
      white-space: normal;
    }
    .theory-message {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }
    .theory-message-avatar {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #fff;
      border: 1px solid rgba(203, 213, 225, .85);
      box-shadow: 0 12px 24px rgba(15, 23, 42, .12);
    }
    .theory-message-avatar-user {
      background: #eaf1ff;
      border-color: rgba(147, 197, 253, .7);
    }
    .theory-message-avatar-assistant {
      background: #ecfdf5;
      border-color: rgba(134, 239, 172, .7);
    }
    .theory-message-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .theory-message-content {
      min-width: 0;
    }
    .theory-message-name {
      display: block;
      color: #64748b;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 5px;
    }
    .theory-message-content p {
      margin: 0;
      color: #1f2937;
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .theory-message-user .theory-message-content p {
      display: inline-block;
      max-width: 100%;
      padding: 10px 13px;
      border-radius: 15px;
      background: #f1f5f9;
      color: #0f172a;
    }
    .theory-message-assistant .theory-message-content p {
      display: inline-block;
      max-width: 100%;
      padding: 10px 13px;
      border-radius: 15px;
      background: #f1f5f9;
      color: #0f172a;
    }
    .theory-message-assistant.is-loading .theory-message-content p {
      color: #64748b;
      min-width: 72px;
      display: inline-grid;
      place-items: center;
    }
    .typing-dots {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 48px;
      min-height: 16px;
      vertical-align: middle;
    }
    .typing-dots span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #64748b;
      opacity: .42;
      animation: typing-dot-bounce 1s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) {
      animation-delay: .14s;
    }
    .typing-dots span:nth-child(3) {
      animation-delay: .28s;
    }
    @keyframes typing-dot-bounce {
      0%, 100% { transform: translateY(0); opacity: .42; }
      50% { transform: translateY(-4px); opacity: 1; }
    }
    .theory-message-assistant.is-error .theory-message-content p {
      color: #b91c1c;
    }
    .theory-sound-settings {
      display: none;
    }
    .theory-assistant-control {
      display: none;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 12px 18px 16px;
      border-top: 1px solid rgba(226, 232, 240, .9);
      background: #f8fafc;
    }
    body:not(.has-theory-assistant) .theory-assistant-dock,
    body:not(.has-theory-assistant) .theory-selection-help,
    body:not(.has-theory-assistant) .theory-assistant-panel {
      display: none !important;
    }
    @media (max-width: 1260px) {
      .shell {
        --sidebar-width: 240px;
        --assistant-width: 300px;
        grid-template-columns: var(--sidebar-width) 8px minmax(420px, 1fr) 8px var(--assistant-width);
      }
      .shell.theory {
        grid-template-columns: var(--sidebar-width) 8px minmax(0, 1fr);
      }
    }
    @media (max-width: 860px) {
      .app { grid-template-rows: auto minmax(0, 1fr); }
      .topbar { align-items: flex-start; flex-direction: column; padding: 18px; }
      .shell, .shell.theory, .chart-grid, .chart-grid.single, .stat-cards, .format-grid, .stage-strip { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .splitter { display: none; }
      .chart-card.wide { grid-column: auto; }
      .theory-assistant-dock {
        right: 28px;
        bottom: 16px;
      }
      .theory-assistant-panel {
        right: 28px;
        bottom: 160px;
      }
      .theory-live-stage {
        grid-template-columns: 74px minmax(0, 1fr);
      }
      .digital-lecturer-panel {
        --lecturer-width: 72px;
        --lecturer-height: 84px;
      }
      .theory-voice-meter {
        display: none;
      }
      .theory-assistant-actions {
        grid-template-columns: 1fr;
      }
      .theory-assistant-quick {
        right: 96px;
      }
      .theory-audio-controls {
        right: 100px;
      }
      .theory-assistant-ask,
      .theory-assistant-voice {
        grid-template-columns: 1fr;
      }
      .settings-layout,
      .settings-grid,
      .settings-state-grid {
        grid-template-columns: 1fr;
      }
      .settings-grid .wide {
        grid-column: auto;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .lecturer-gif-stage {
        animation: none !important;
      }
      .theory-assistant-fab,
      .theory-assistant-quick,
      .theory-audio-controls,
      .theory-assistant-actions button,
      .theory-assistant-ask button,
      .theory-assistant-control button {
        transition: none !important;
      }
      .theory-voice-meter span {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="logo">ML</div>
      <div>
        <h1>简单线性回归教学实验</h1>
      </div>
    </div>
    <div class="top-actions hidden-top">
      <span class="pill" id="topFeature">当前特征 RM</span>
      <button class="primary-btn" type="button" id="jumpExperiment">开始实验</button>
    </div>
  </header>

  <div class="shell">
    <aside class="sidebar">
      <section class="nav-section">
        <div class="nav-section-title">理论部分</div>
        <div class="step-list">
          <button class="nav-btn" data-page="basic" type="button"><span class="dot"></span><span><strong>实验基本信息</strong><span>实验背景与任务</span></span></button>
          <button class="nav-btn" data-page="purpose" type="button"><span class="dot"></span><span><strong>实验目的</strong><span>你需要掌握什么</span></span></button>
          <button class="nav-btn" data-page="knowledge" type="button"><span class="dot"></span><span><strong>前置知识</strong><span>线性函数与误差</span></span></button>
          <details class="nested-section" open>
            <summary><span class="dot"></span><span><strong>模型介绍</strong><span class="sub">数据、模型和指标</span></span><span class="chev">›</span></summary>
            <div class="step-list">
              <button class="nav-btn" data-page="dataset" type="button"><span class="dot"></span><span><strong>数据集</strong><span>特征、标签和标准化</span></span></button>
              <button class="nav-btn" data-page="model" type="button"><span class="dot"></span><span><strong>训练模型</strong><span>y = wx + b</span></span></button>
              <button class="nav-btn" data-page="criterion" type="button"><span class="dot"></span><span><strong>学习准则</strong><span>MSE 损失函数</span></span></button>
              <button class="nav-btn" data-page="optimization" type="button"><span class="dot"></span><span><strong>参数优化</strong><span>梯度下降更新</span></span></button>
              <button class="nav-btn" data-page="evaluation" type="button"><span class="dot"></span><span><strong>评价指标</strong><span>RMSE、MAE、R 平方</span></span></button>
            </div>
          </details>
          <button class="nav-btn" data-page="result" type="button"><span class="dot"></span><span><strong>预期成果</strong><span>实验完成标准</span></span></button>
          <button class="nav-btn" data-page="thinking" type="button"><span class="dot"></span><span><strong>思考拓展</strong><span>从单特征到多特征</span></span></button>
        </div>
      </section>

      <section class="nav-section">
        <div class="nav-section-title">实验部分</div>
        <div class="step-list">
          <button class="nav-btn" data-page="preprocess" type="button"><span class="dot"></span><span><strong>数据预处理</strong><span>观察数据与相关性</span></span></button>
          <button class="nav-btn" data-page="train_eval" type="button"><span class="dot"></span><span><strong>模型训练与评估</strong><span>训练、优化和指标</span></span></button>
          <button class="nav-btn" data-page="predict" type="button"><span class="dot"></span><span><strong>模型预测</strong><span>输入样本并查看结果</span></span></button>
          <button class="nav-btn" data-page="student" type="button"><span class="dot"></span><span><strong>自主实验</strong><span>上传数据并完成训练</span></span></button>
        </div>
      </section>

      <section class="nav-section">
        <div class="nav-section-title">系统设置</div>
        <div class="step-list">
          <button class="nav-btn" data-page="settings" type="button"><span class="dot"></span><span><strong>AI 助教设置</strong><span>模型、音色和语速</span></span></button>
        </div>
      </section>
    </aside>

    <div class="splitter splitter-left" data-resize-edge="left" role="separator" aria-orientation="vertical" aria-label="调整左侧导航宽度"></div>

    <main class="main" id="main"></main>

    <div class="splitter splitter-right" data-resize-edge="right" role="separator" aria-orientation="vertical" aria-label="调整右侧控制面板宽度"></div>

    <aside class="assistant">
      <div id="rightPanel"></div>
    </aside>
  </div>
</div>

<script>
const FEATURE_NAMES = {{ feature_names | tojson }};
const DEFAULT_FEATURE = {{ default_feature | tojson }};
</script>
<script src="/static/js/state_runtime.js"></script>
<script src="/static/js/schema_registry.js"></script>
<script src="/static/js/theory_page.js"></script>
<script src="/static/js/preprocess_page.js"></script>
<script src="/static/js/student_page.js"></script>
<script src="/static/js/predict_page.js"></script>
<script src="/static/js/train_page.js"></script>
<script src="/static/js/theory_assistant.js"></script>
<script src="/static/js/settings_page.js"></script>
<script src="/static/js/app_shell.js"></script>
</body>
</html>
